<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BitBot 모의 자동매매</title>
  <style>
    :root {
      --bg: #0b0e11;
      --panel: #11161d;
      --panel-2: #171d26;
      --line: #263241;
      --text: #d7dde7;
      --muted: #8b98a9;
      --blue: #0062df;
      --blue-2: #0b74ff;
      --red: #f6465d;
      --green: #0ecb81;
      --input: #0f141b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Malgun Gothic", sans-serif; letter-spacing: 0; }
    body { overflow-x: hidden; }
    button, input, select { font: inherit; }
    .topbar { height: 56px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--line); background: #0d1117; position: sticky; top: 0; z-index: 10; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; }
    .brand-mark { width: 28px; height: 28px; border-radius: 6px; background: var(--blue); display: grid; place-items: center; color: white; font-weight: 900; }
    .layout { display: grid; grid-template-columns: minmax(0, 1.35fr) 360px; gap: 1px; max-width: 1480px; margin: 0 auto; background: var(--line); min-height: calc(100vh - 56px); }
    .main, .side { background: var(--bg); min-width: 0; }
    .ticker-strip { display: grid; grid-template-columns: 180px repeat(5, minmax(100px, 1fr)); gap: 1px; background: var(--line); border-bottom: 1px solid var(--line); }
    .ticker-cell { background: var(--panel); padding: 14px 16px; min-height: 70px; }
    .ticker-cell span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .ticker-cell strong { font-size: 18px; color: #fff; }
    .ticker-cell .up { color: var(--red); }
    .ticker-cell .down { color: var(--blue-2); }
    .chart-panel { background: var(--panel); border-bottom: 1px solid var(--line); padding: 16px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .panel-title { font-size: 15px; font-weight: 700; }
    .panel-sub { color: var(--muted); font-size: 12px; }
    .chart-wrap { position: relative; height: 520px; background: #0f141b; border: 1px solid var(--line); overflow: hidden; }
    canvas { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
    canvas:active { cursor: grabbing; }
    .result-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1px; background: var(--line); }
    .result-card { background: var(--panel); padding: 16px; min-height: 92px; }
    .result-card span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .result-card strong { font-size: 22px; color: #fff; }
    .result-card .red { color: var(--red); }
    .result-card .blue { color: var(--blue-2); }
    .history-panel { background: var(--panel); border-top: 1px solid var(--line); padding: 16px; }
    .history-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .history-title { font-size: 15px; font-weight: 800; }
    .history-count { color: var(--muted); font-size: 12px; }
    .history-table-wrap { overflow-x: auto; border: 1px solid var(--line); background: var(--input); }
    .history-table { width: 100%; border-collapse: collapse; min-width: 620px; }
    .history-table th, .history-table td { padding: 10px 12px; border-bottom: 1px solid var(--line); font-size: 12px; text-align: right; white-space: nowrap; }
    .history-table th { color: var(--muted); background: #101722; font-weight: 700; }
    .history-table th:first-child, .history-table td:first-child { text-align: left; }
    .history-table tr:last-child td { border-bottom: none; }
    .history-empty { color: var(--muted); font-size: 13px; padding: 18px; text-align: center; }
    .side { background: var(--panel); }
    .form-panel { background: var(--panel); padding: 16px; border-bottom: 1px solid var(--line); }
    .form-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-weight: 800; }
    .mode-pill { background: rgba(0, 98, 223, 0.18); color: #72a8ff; border: 1px solid rgba(11, 116, 255, 0.35); border-radius: 4px; padding: 4px 8px; font-size: 12px; }
    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    .field label { color: var(--muted); font-size: 12px; }
    .field input, .field select { width: 100%; height: 38px; border: 1px solid var(--line); background: var(--input); color: var(--text); border-radius: 4px; padding: 0 10px; outline: none; }
    .field input:focus, .field select:focus { border-color: var(--blue-2); }
    .section-label { color: #fff; font-size: 13px; font-weight: 800; margin: 16px 0 10px; }
    .condition { display: grid; gap: 8px; padding: 10px; border: 1px solid var(--line); background: var(--input); border-radius: 4px; margin-bottom: 8px; }
    .condition-head { display: flex; align-items: center; gap: 8px; color: var(--text); font-size: 13px; font-weight: 700; }
    .condition-head input { width: 16px; height: 16px; accent-color: var(--blue-2); }
    .condition .field { margin-bottom: 0; }
    .condition input:disabled, .condition select:disabled { opacity: 0.45; cursor: not-allowed; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .date-field { display: grid; gap: 6px; margin-bottom: 12px; }
    .date-field label { color: var(--muted); font-size: 12px; }
    .date-selects { display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr; gap: 6px; }
    .date-selects select { width: 100%; height: 38px; border: 1px solid var(--line); background: var(--input); color: var(--text); border-radius: 4px; padding: 0 8px; outline: none; }
    .date-selects select:focus { border-color: var(--blue-2); }
    .submit { width: 100%; height: 46px; border: none; border-radius: 4px; background: var(--blue); color: white; cursor: pointer; font-weight: 800; margin-top: 6px; }
    .submit:hover { background: var(--blue-2); }
    .hint { color: var(--muted); font-size: 12px; line-height: 1.6; margin-top: 12px; }
    .live-line { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12px; margin-top: 10px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px rgba(14, 203, 129, 0.15); flex: 0 0 auto; }
    .status-text { text-align: right; }
    .buy { color: var(--red); }
    .sell { color: var(--blue-2); }
    @media (max-width: 1050px) { .layout { grid-template-columns: 1fr; } .ticker-strip, .result-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .chart-wrap { height: 430px; } }
    @media (max-width: 620px) { .topbar { height: auto; padding: 12px; } .ticker-strip, .result-grid, .two { grid-template-columns: 1fr; } .chart-wrap { height: 360px; } }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="brand-mark">B</div><div>BitBot</div></div>
  </header>
  <div class="layout">
    <main class="main">
      <section class="ticker-strip">
        <div class="ticker-cell"><span>마켓</span><strong id="marketName">KRW-BTC</strong></div>
        <div class="ticker-cell"><span>마지막 종가</span><strong id="lastClose">-</strong></div>
        <div class="ticker-cell"><span>기간 수익률</span><strong id="marketReturn">-</strong></div>
        <div class="ticker-cell"><span>전략 수익률</span><strong id="strategyReturn">-</strong></div>
        <div class="ticker-cell"><span>거래 횟수</span><strong id="tradeCount">-</strong></div>
        <div class="ticker-cell"><span>최종 자산</span><strong id="finalValue">-</strong></div>
      </section>
      <section class="chart-panel">
        <div class="panel-head">
          <div><div class="panel-title">실시간 차트와 자동매매 시뮬레이션</div><div class="panel-sub" id="dataStatus">Upbit 실시간 캔들 데이터를 불러오는 중입니다.</div></div>
        </div>
        <div class="chart-wrap"><canvas id="chart" width="1100" height="520"></canvas></div>
      </section>
      <section class="result-grid">
        <div class="result-card"><span>시작 자산</span><strong id="initialAsset">-</strong></div>
        <div class="result-card"><span>총 손익</span><strong id="profitLoss">-</strong></div>
        <div class="result-card"><span>최대 낙폭</span><strong id="maxDrawdown">-</strong></div>
        <div class="result-card"><span>승률</span><strong id="winRate">-</strong></div>
      </section>
      <section class="history-panel">
        <div class="history-head"><div class="history-title">거래 내역</div><div class="history-count" id="tradeHistoryCount">-</div></div>
        <div class="history-table-wrap" id="tradeHistory"></div>
      </section>
    </main>
    <aside class="side">
      <section class="form-panel">
        <div class="form-title"><span>모의 조건</span><span class="mode-pill">자동 갱신</span></div>
        <form id="backtestForm">
          <div class="field">
            <label>마켓</label>
            <select name="market">
              <option value="KRW-BTC">KRW-BTC 실시간</option>
              <option value="KRW-ETH">KRW-ETH 실시간</option>
              <option value="KRW-XRP">KRW-XRP 실시간</option>
            </select>
          </div>
          <div class="two">
            <div class="field"><label>차트 간격</label><select name="interval"><option value="days" selected>일봉</option><option value="60">1시간</option><option value="15">15분</option><option value="5">5분</option><option value="1">1분</option></select></div>
            <div class="field"><label>초기 자산</label><input type="number" name="initialCash" min="100" step="100" value="10000" required /></div>
          </div>
          <div class="date-field">
            <label>시작일</label>
            <div class="date-selects">
              <select name="startYear" aria-label="시작 연도"></select>
              <select name="startMonth" aria-label="시작 월"></select>
              <select name="startDay" aria-label="시작 일"></select>
            </div>
          </div>
          <div class="date-field">
            <label>종료일</label>
            <div class="date-selects">
              <select name="endYear" aria-label="종료 연도"></select>
              <select name="endMonth" aria-label="종료 월"></select>
              <select name="endDay" aria-label="종료 일"></select>
            </div>
          </div>
          <div class="field"><label>주문 비중(%)</label><input type="number" name="orderPct" min="1" max="100" step="1" value="75" required /></div>
          <div class="two"><div class="field"><label>RSI 기간</label><input type="number" name="rsiPeriod" min="2" max="100" step="1" value="14" required /></div><div class="field"><label>거래량 평균 기간</label><input type="number" name="volumePeriod" min="2" max="200" step="1" value="20" required /></div></div>
          <div class="two"><div class="field"><label>볼린저 기간</label><input type="number" name="bbPeriod" min="2" max="200" step="1" value="20" required /></div><div class="field"><label>볼린저 배수</label><input type="number" name="bbMultiplier" min="0.5" max="5" step="0.1" value="2" required /></div></div>
          <div class="section-label">매수 조건</div>
          <div class="two"><div class="field"><label>매수 조합</label><select name="buyMode"><option value="any" selected>하나라도 만족</option><option value="all">모두 만족</option></select></div><div class="field"><label>매도 조합</label><select name="sellMode"><option value="any" selected>하나라도 만족</option><option value="all">모두 만족</option></select></div></div>
          <div class="condition"><label class="condition-head"><input type="checkbox" name="buyUseRsi" checked />RSI 이하 매수</label><div class="field"><label>RSI 기준</label><input type="number" name="buyRsi" min="1" max="100" step="0.1" value="30" required /></div></div>
          <div class="condition"><label class="condition-head"><input type="checkbox" name="buyUseMaCross" checked />MA15가 MA50을 상향 돌파</label></div>
          <div class="two"><div class="condition"><label class="condition-head"><input type="checkbox" name="buyUseMa15CrossUp" />가격이 MA15 상향 돌파</label></div><div class="condition"><label class="condition-head"><input type="checkbox" name="buyUseMa15CrossDown" />가격이 MA15 하향 돌파</label></div></div>
          <div class="two"><div class="condition"><label class="condition-head"><input type="checkbox" name="buyUseMa50CrossUp" />가격이 MA50 상향 돌파</label></div><div class="condition"><label class="condition-head"><input type="checkbox" name="buyUseMa50CrossDown" />가격이 MA50 하향 돌파</label></div></div>
          <div class="condition"><label class="condition-head"><input type="checkbox" name="buyUseBbLower" checked />볼린저밴드 하단 이하 매수</label></div>
          <div class="condition"><label class="condition-head"><input type="checkbox" name="buyUseVolumeSpike" />거래량 급증 매수</label><div class="field"><label>평균 거래량 대비 배수</label><input type="number" name="buyVolumeMultiplier" min="1" max="20" step="0.1" value="2" required /></div></div>
          <div class="section-label">매도 조건</div>
          <div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseRsi" checked />RSI 이상 매도</label><div class="field"><label>RSI 기준</label><input type="number" name="sellRsi" min="1" max="100" step="0.1" value="70" required /></div></div>
          <div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseMaCross" checked />MA15가 MA50을 하향 돌파</label></div>
          <div class="two"><div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseMa15CrossUp" />가격이 MA15 상향 돌파</label></div><div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseMa15CrossDown" />가격이 MA15 하향 돌파</label></div></div>
          <div class="two"><div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseMa50CrossUp" />가격이 MA50 상향 돌파</label></div><div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseMa50CrossDown" />가격이 MA50 하향 돌파</label></div></div>
          <div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseBbUpper" checked />볼린저밴드 상단 이상 매도</label></div>
          <div class="two"><div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseTakeProfit" checked />익절</label><div class="field"><label>수익률(%)</label><input type="number" name="takeProfit" min="0.1" max="100" step="0.1" value="3" required /></div></div><div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseStopLoss" checked />손절</label><div class="field"><label>손실률(%)</label><input type="number" name="stopLoss" min="0.1" max="100" step="0.1" value="2" required /></div></div></div>
          <div class="condition"><label class="condition-head"><input type="checkbox" name="sellUseTrailing" />트레일링 스탑</label><div class="field"><label>고점 대비 하락률(%)</label><input type="number" name="trailingStop" min="0.1" max="100" step="0.1" value="2.5" required /></div></div>
          <div class="field"><label>수수료(%)</label><input type="number" name="feePct" min="0" max="1" step="0.001" value="0.05" required /></div>
          <button class="submit" type="submit">모의 테스트 실행</button>
          <div class="live-line"><span><span class="live-dot"></span> 공개 시세 자동 갱신</span><span class="status-text" id="lastUpdated">-</span></div>
        </form>
      </section>
    </aside>
  </div>
  <script>
    const form = document.querySelector("#backtestForm");
    const canvas = document.querySelector("#chart");
    const ctx = canvas.getContext("2d");
    let candles = [];
    let lastChartData = null;
    let lastChartEquity = null;
    let lastChartTrades = null;
    let lastChartConfig = null;
    let chartViewStart = 0;
    let chartViewSize = 90;
    let dragStartX = 0;
    let dragStartView = 0;
    let isDraggingChart = false;
    let refreshTimer = null;
    let lastSuccessfulLoad = null;
    let candleSetKey = "";
    const CACHE_TTL_MS = 10 * 60 * 1000;
    const DIRECT_FETCH_TIMEOUT_MS = 2500;
    const FALLBACK_FETCH_TIMEOUT_MS = 4500;
    const cacheKey = (market, interval) => `bitbot:candles:${market}:${interval}`;
    const $ = (id) => document.getElementById(id);
    const fmtMoney = (value) => Number(value).toLocaleString("ko-KR", { maximumFractionDigits: 2 });
    const fmtPct = (value) => `${value >= 0 ? "+" : ""}${value.toFixed(2)}%`;
    const fmtVolume = (value) => Number(value).toLocaleString("ko-KR", { maximumFractionDigits: 8 });
    const parseDate = (value) => {
      if (value.includes("T")) return new Date(`${value}+09:00`);
      if (value.includes(" ")) return new Date(`${value.replace(" ", "T")}+09:00`);
      return new Date(`${value}T00:00:00+09:00`);
    };
    const formatDateInput = (date) => {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };
    const todayKst = () => {
      const now = new Date();
      return new Date(now.toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
    };
    const dateFromParts = (prefix) => `${form[`${prefix}Year`].value}-${form[`${prefix}Month`].value}-${form[`${prefix}Day`].value}`;
    const selectedDateRange = () => {
      const fallback = formatDateInput(todayKst());
      return {
        startDate: form.startYear.value ? dateFromParts("start") : fallback,
        endDate: form.endYear.value ? dateFromParts("end") : fallback
      };
    };

    function fillSelect(select, values, suffix = "") {
      select.innerHTML = values.map((value) => {
        const padded = String(value).padStart(2, "0");
        return `<option value="${padded}">${value}${suffix}</option>`;
      }).join("");
    }

    function setSelectDate(prefix, dateValue) {
      const date = parseDate(dateValue);
      form[`${prefix}Year`].value = String(date.getFullYear());
      form[`${prefix}Month`].value = String(date.getMonth() + 1).padStart(2, "0");
      form[`${prefix}Day`].value = String(date.getDate()).padStart(2, "0");
    }

    function setupDateSelects() {
      const currentYear = todayKst().getFullYear();
      const oldestYear = candles.length ? parseDate(candles[0].date).getFullYear() : currentYear - 5;
      const years = [];
      for (let year = currentYear; year >= oldestYear; year -= 1) years.push(year);
      ["start", "end"].forEach((prefix) => {
        fillSelect(form[`${prefix}Year`], years, "년");
        fillSelect(form[`${prefix}Month`], Array.from({ length: 12 }, (_, index) => index + 1), "월");
        fillSelect(form[`${prefix}Day`], Array.from({ length: 31 }, (_, index) => index + 1), "일");
      });
      setDefaultDateRange();
    }

    async function fetchJson(url) {
      const fallbackUrls = [
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://corsproxy.io/?${encodeURIComponent(url)}`
      ];
      const request = async (nextUrl, timeoutMs) => {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(nextUrl, { cache: "no-store", signal: controller.signal });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        } finally {
          clearTimeout(timer);
        }
      };
      try {
        return await request(url, DIRECT_FETCH_TIMEOUT_MS);
      } catch (directError) {
        try {
          return await Promise.any(fallbackUrls.map((nextUrl) => request(nextUrl, FALLBACK_FETCH_TIMEOUT_MS)));
        } catch {
          throw directError || new Error("데이터 요청에 실패했습니다.");
        }
      }
    }

    function readCachedCandles(market, interval) {
      try {
        const cached = JSON.parse(localStorage.getItem(cacheKey(market, interval)) || "null");
        if (!cached || !Array.isArray(cached.rows)) return null;
        if (Date.now() - cached.savedAt > CACHE_TTL_MS) return null;
        return cached.rows;
      } catch {
        return null;
      }
    }

    function writeCachedCandles(market, interval, rows) {
      try {
        localStorage.setItem(cacheKey(market, interval), JSON.stringify({ savedAt: Date.now(), rows }));
      } catch {
        // 저장 공간이 부족해도 실시간 표시 자체는 계속 동작해야 합니다.
      }
    }

    function mergeCandles(previous, next) {
      const merged = new Map();
      [...previous, ...next].forEach((row) => merged.set(row.date, row));
      return Array.from(merged.values()).sort((a, b) => parseDate(a.date) - parseDate(b.date));
    }

    async function fetchUpbitCandles(market, interval, pageCount = interval === "days" ? 2 : 3) {
      const path = interval === "days" ? "days" : `minutes/${interval}`;
      let to = "";
      const pages = [];
      for (let page = 0; page < pageCount; page += 1) {
        const params = new URLSearchParams({ market, count: "200" });
        if (to) params.set("to", to);
        const rows = await fetchJson(`https://api.upbit.com/v1/candles/${path}?${params.toString()}`);
        if (!Array.isArray(rows) || rows.length === 0) break;
        pages.push(...rows);
        to = rows[rows.length - 1].candle_date_time_utc;
      }
      const uniqueRows = Array.from(new Map(pages.map((row) => [row.timestamp, row])).values());
      return uniqueRows.reverse().map((row) => ({
        date: row.candle_date_time_kst.replace("T", " ").slice(0, interval === "days" ? 10 : 16),
        open: Number(row.opening_price),
        high: Number(row.high_price),
        low: Number(row.low_price),
        close: Number(row.trade_price),
        volume: Number(row.candle_acc_trade_volume)
      })).filter((row) => Number.isFinite(row.close));
    }

    async function loadCandles(options = {}) {
      const config = readConfig();
      const nextCacheKey = cacheKey(config.market, config.interval);
      if (candleSetKey && candleSetKey !== nextCacheKey) {
        candles = [];
        lastChartData = null;
        lastChartEquity = null;
        lastChartTrades = null;
        lastChartConfig = null;
      }
      if (!options.silent) $("dataStatus").textContent = `${config.market} 실시간 캔들 데이터를 불러오는 중입니다.`;
      const cached = readCachedCandles(config.market, config.interval);
      if (!candles.length && cached?.length) {
        candles = cached;
        candleSetKey = nextCacheKey;
        $("marketName").textContent = config.market;
        $("dataStatus").textContent = `${config.market} 저장된 시세를 먼저 표시하고 최신 데이터를 확인 중입니다.`;
        if (!options.keepDates) setupDateSelects();
        runBacktest();
      } else if (!candles.length) {
        drawMessage("시세 데이터를 불러오는 중입니다.");
      }
      try {
        const fresh = await fetchUpbitCandles(config.market, config.interval, options.quick ? 1 : undefined);
        candles = options.quick && candles.length ? mergeCandles(candles, fresh) : fresh;
        candleSetKey = nextCacheKey;
        writeCachedCandles(config.market, config.interval, candles);
        $("marketName").textContent = config.market;
        $("dataStatus").textContent = `${config.market} ${config.interval === "days" ? "일봉" : `${config.interval}분봉`} 실시간 차트입니다.`;
        lastSuccessfulLoad = new Date();
      } catch (error) {
        console.error(error);
        if (candles.length) {
          const time = lastSuccessfulLoad ? lastSuccessfulLoad.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "이전";
          $("dataStatus").textContent = `새 데이터 요청이 지연되어 ${time} 데이터를 유지 중입니다.`;
          return;
        }
        $("dataStatus").textContent = "시세 연결을 재시도하는 중입니다.";
        drawMessage("시세 연결을 재시도하는 중입니다.");
        return;
      }
      if (!candles.length) throw new Error("표시할 캔들 데이터가 없습니다.");
      if (!options.keepDates) setupDateSelects();
      $("lastUpdated").textContent = `마지막 갱신 ${new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
      runBacktest();
    }

    function sma(data, period, index) {
      if (index + 1 < period) return null;
      let sum = 0;
      for (let i = index - period + 1; i <= index; i += 1) sum += data[i].close;
      return sum / period;
    }

    function stddev(data, period, index, avg) {
      if (avg === null) return null;
      let variance = 0;
      for (let i = index - period + 1; i <= index; i += 1) {
        variance += (data[i].close - avg) ** 2;
      }
      return Math.sqrt(variance / period);
    }

    function bollinger(data, period, multiplier, index) {
      const middle = sma(data, period, index);
      const deviation = stddev(data, period, index, middle);
      if (middle === null || deviation === null) return null;
      return {
        upper: middle + deviation * multiplier,
        middle,
        lower: middle - deviation * multiplier
      };
    }

    function averageVolume(data, period, index) {
      if (index + 1 < period) return null;
      let sum = 0;
      for (let i = index - period + 1; i <= index; i += 1) sum += data[i].volume;
      return sum / period;
    }

    function maCross(data, fastPeriod, slowPeriod, index, direction) {
      if (index < slowPeriod) return false;
      const prevFast = sma(data, fastPeriod, index - 1);
      const prevSlow = sma(data, slowPeriod, index - 1);
      const fast = sma(data, fastPeriod, index);
      const slow = sma(data, slowPeriod, index);
      if (![prevFast, prevSlow, fast, slow].every(Number.isFinite)) return false;
      return direction === "up" ? prevFast <= prevSlow && fast > slow : prevFast >= prevSlow && fast < slow;
    }

    function priceCrossMa(data, period, index, direction) {
      if (index < period) return false;
      const prevMa = sma(data, period, index - 1);
      const currentMa = sma(data, period, index);
      const prevClose = data[index - 1].close;
      const currentClose = data[index].close;
      if (![prevMa, currentMa, prevClose, currentClose].every(Number.isFinite)) return false;
      return direction === "up"
        ? prevClose <= prevMa && currentClose > currentMa
        : prevClose >= prevMa && currentClose < currentMa;
    }

    function passConditions(results, mode) {
      const active = results.filter((value) => value !== null);
      if (!active.length) return false;
      return mode === "all" ? active.every(Boolean) : active.some(Boolean);
    }

    function rsi(data, period, index) {
      if (index < period) return null;
      let gains = 0;
      let losses = 0;
      for (let i = index - period + 1; i <= index; i += 1) {
        const diff = data[i].close - data[i - 1].close;
        if (diff >= 0) gains += diff;
        else losses -= diff;
      }
      if (losses === 0) return 100;
      const rs = gains / period / (losses / period);
      return 100 - (100 / (1 + rs));
    }

    function readConfig() {
      const data = new FormData(form);
      return {
        market: data.get("market"),
        interval: data.get("interval"),
        ...selectedDateRange(),
        initialCash: Number(data.get("initialCash")),
        orderPct: Number(data.get("orderPct")) / 100,
        rsiPeriod: Number(data.get("rsiPeriod")),
        volumePeriod: Number(data.get("volumePeriod")),
        bbPeriod: Number(data.get("bbPeriod")),
        bbMultiplier: Number(data.get("bbMultiplier")),
        buyMode: data.get("buyMode"),
        sellMode: data.get("sellMode"),
        buyUseRsi: data.has("buyUseRsi"),
        buyRsi: Number(data.get("buyRsi")),
        buyUseMaCross: data.has("buyUseMaCross"),
        buyUseMa15CrossUp: data.has("buyUseMa15CrossUp"),
        buyUseMa15CrossDown: data.has("buyUseMa15CrossDown"),
        buyUseMa50CrossUp: data.has("buyUseMa50CrossUp"),
        buyUseMa50CrossDown: data.has("buyUseMa50CrossDown"),
        buyUseBbLower: data.has("buyUseBbLower"),
        buyUseVolumeSpike: data.has("buyUseVolumeSpike"),
        buyVolumeMultiplier: Number(data.get("buyVolumeMultiplier")),
        sellUseRsi: data.has("sellUseRsi"),
        sellRsi: Number(data.get("sellRsi")),
        sellUseMaCross: data.has("sellUseMaCross"),
        sellUseMa15CrossUp: data.has("sellUseMa15CrossUp"),
        sellUseMa15CrossDown: data.has("sellUseMa15CrossDown"),
        sellUseMa50CrossUp: data.has("sellUseMa50CrossUp"),
        sellUseMa50CrossDown: data.has("sellUseMa50CrossDown"),
        sellUseBbUpper: data.has("sellUseBbUpper"),
        sellUseTakeProfit: data.has("sellUseTakeProfit"),
        takeProfit: Number(data.get("takeProfit")),
        sellUseStopLoss: data.has("sellUseStopLoss"),
        stopLoss: Number(data.get("stopLoss")),
        sellUseTrailing: data.has("sellUseTrailing"),
        trailingStop: Number(data.get("trailingStop")),
        feePct: Number(data.get("feePct")) / 100
      };
    }

    function runBacktest() {
      const config = readConfig();
      const start = parseDate(config.startDate);
      const end = config.endDate.includes("T") || config.endDate.includes(" ")
        ? parseDate(config.endDate)
        : new Date(`${config.endDate}T23:59:59+09:00`);
      const sliced = candles.filter((row) => {
        const date = parseDate(row.date);
        return date >= start && date <= end;
      });
      if (sliced.length < Math.max(config.rsiPeriod, config.bbPeriod, config.volumePeriod, 50) + 2) {
        $("dataStatus").textContent = "선택한 기간이 조건 계산에 너무 짧습니다.";
        drawMessage("선택한 기간이 너무 짧습니다.");
        renderTradeHistory([]);
        return;
      }
      let cash = config.initialCash;
      let coin = 0;
      let entryPrice = 0;
      let highestPrice = 0;
      let wins = 0;
      let closedTrades = 0;
      let peak = config.initialCash;
      let maxDrawdown = 0;
      const trades = [];
      const equity = [];
      for (let i = 1; i < sliced.length; i += 1) {
        const candle = sliced[i];
        const price = candle.close;
        const currentRsi = rsi(sliced, config.rsiPeriod, i);
        const bands = bollinger(sliced, config.bbPeriod, config.bbMultiplier, i);
        const previousVolumeAvg = averageVolume(sliced, config.volumePeriod, i - 1);
        const value = cash + coin * price;
        peak = Math.max(peak, value);
        maxDrawdown = Math.min(maxDrawdown, ((value - peak) / peak) * 100);
        if (currentRsi === null || !bands || previousVolumeAvg === null) {
          equity.push({ date: candle.date, value });
          continue;
        }
        if (coin <= 0) {
          const buySignals = [
            config.buyUseRsi ? currentRsi <= config.buyRsi : null,
            config.buyUseMaCross ? maCross(sliced, 15, 50, i, "up") : null,
            config.buyUseMa15CrossUp ? priceCrossMa(sliced, 15, i, "up") : null,
            config.buyUseMa15CrossDown ? priceCrossMa(sliced, 15, i, "down") : null,
            config.buyUseMa50CrossUp ? priceCrossMa(sliced, 50, i, "up") : null,
            config.buyUseMa50CrossDown ? priceCrossMa(sliced, 50, i, "down") : null,
            config.buyUseBbLower ? price <= bands.lower : null,
            config.buyUseVolumeSpike ? candle.volume >= previousVolumeAvg * config.buyVolumeMultiplier : null
          ];
          const shouldBuy = passConditions(buySignals, config.buyMode);
          if (shouldBuy) {
            const spend = cash * config.orderPct;
            const netSpend = spend * (1 - config.feePct);
            coin = netSpend / price;
            cash -= spend;
            entryPrice = price;
            highestPrice = price;
            trades.push({ date: candle.date, side: "매수", price, volume: coin, amount: spend, entryPrice: price, pnlPct: null });
          }
        } else {
          highestPrice = Math.max(highestPrice, price);
          const pnlPct = ((price - entryPrice) / entryPrice) * 100;
          const trailingPct = ((price - highestPrice) / highestPrice) * 100;
          const sellSignals = [
            config.sellUseRsi ? currentRsi >= config.sellRsi : null,
            config.sellUseMaCross ? maCross(sliced, 15, 50, i, "down") : null,
            config.sellUseMa15CrossUp ? priceCrossMa(sliced, 15, i, "up") : null,
            config.sellUseMa15CrossDown ? priceCrossMa(sliced, 15, i, "down") : null,
            config.sellUseMa50CrossUp ? priceCrossMa(sliced, 50, i, "up") : null,
            config.sellUseMa50CrossDown ? priceCrossMa(sliced, 50, i, "down") : null,
            config.sellUseBbUpper ? price >= bands.upper : null,
            config.sellUseTakeProfit ? pnlPct >= config.takeProfit : null,
            config.sellUseStopLoss ? pnlPct <= -config.stopLoss : null,
            config.sellUseTrailing ? trailingPct <= -config.trailingStop : null
          ];
          const shouldSell = passConditions(sellSignals, config.sellMode);
          if (shouldSell) {
            const gross = coin * price;
            const net = gross * (1 - config.feePct);
            cash += net;
            if (price > entryPrice) wins += 1;
            closedTrades += 1;
            trades.push({ date: candle.date, side: "매도", price, volume: coin, amount: gross, entryPrice, pnlPct });
            coin = 0;
            entryPrice = 0;
            highestPrice = 0;
          }
        }
        equity.push({ date: candle.date, value: cash + coin * price });
      }
      const last = sliced[sliced.length - 1];
      const finalValue = cash + coin * last.close;
      const profit = finalValue - config.initialCash;
      const strategyReturn = (profit / config.initialCash) * 100;
      const marketReturn = ((last.close - sliced[0].close) / sliced[0].close) * 100;
      const winRate = closedTrades > 0 ? (wins / closedTrades) * 100 : 0;
      renderStats({ initialCash: config.initialCash, finalValue, profit, strategyReturn, marketReturn, maxDrawdown, winRate, tradeCount: trades.length, lastClose: last.close });
      lastChartData = sliced;
      lastChartEquity = equity;
      lastChartTrades = trades;
      lastChartConfig = config;
      chartViewSize = Math.min(90, sliced.length);
      chartViewStart = Math.max(0, sliced.length - chartViewSize);
      drawChart(sliced, equity, trades, config);
      renderTradeHistory(trades);
    }

    function renderStats(result) {
      $("lastClose").textContent = fmtMoney(result.lastClose);
      $("marketReturn").textContent = fmtPct(result.marketReturn);
      $("marketReturn").className = result.marketReturn >= 0 ? "up" : "down";
      $("strategyReturn").textContent = fmtPct(result.strategyReturn);
      $("strategyReturn").className = result.strategyReturn >= 0 ? "up" : "down";
      $("tradeCount").textContent = `${result.tradeCount}건`;
      $("finalValue").textContent = fmtMoney(result.finalValue);
      $("initialAsset").textContent = fmtMoney(result.initialCash);
      $("profitLoss").textContent = fmtMoney(result.profit);
      $("profitLoss").className = result.profit >= 0 ? "red" : "blue";
      $("maxDrawdown").textContent = fmtPct(result.maxDrawdown);
      $("maxDrawdown").className = "blue";
      $("winRate").textContent = `${result.winRate.toFixed(1)}%`;
    }

    function renderTradeHistory(trades) {
      $("tradeHistoryCount").textContent = trades.length ? `${trades.length}건` : "거래 없음";
      if (!trades.length) {
        $("tradeHistory").innerHTML = `<div class="history-empty">선택한 조건으로 발생한 매수/매도 내역이 없습니다.</div>`;
        return;
      }
      const rows = trades.map((trade, index) => {
        const pnl = trade.pnlPct === null ? "-" : `<span class="${trade.pnlPct >= 0 ? "buy" : "sell"}">${fmtPct(trade.pnlPct)}</span>`;
        const entry = trade.side === "매도" ? fmtMoney(trade.entryPrice) : "-";
        return `<tr>
          <td>${index + 1}</td>
          <td>${trade.date}</td>
          <td class="${trade.side === "매수" ? "buy" : "sell"}">${trade.side}</td>
          <td>${fmtMoney(trade.price)}</td>
          <td>${entry}</td>
          <td>${fmtVolume(trade.volume)}</td>
          <td>${fmtMoney(trade.amount)}</td>
          <td>${pnl}</td>
        </tr>`;
      }).join("");
      $("tradeHistory").innerHTML = `<table class="history-table">
        <thead><tr><th>No.</th><th>일시</th><th>구분</th><th>체결가</th><th>매수가</th><th>수량</th><th>금액</th><th>손익률</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function drawChart(data, equity, trades, config) {
      if (!data.length) return;
      chartViewSize = Math.min(chartViewSize, data.length);
      chartViewStart = Math.max(0, Math.min(chartViewStart, data.length - chartViewSize));
      const viewEnd = chartViewStart + chartViewSize;
      const visibleData = data.slice(chartViewStart, viewEnd);
      const visibleEquity = equity.slice(chartViewStart, viewEnd);
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      const width = rect.width;
      const height = rect.height;
      const pad = { top: width < 620 ? 42 : 24, right: 70, bottom: 42, left: 16 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const prices = visibleData.flatMap((row) => [row.high, row.low]);
      visibleData.forEach((_, index) => {
        const sourceIndex = chartViewStart + index;
        const ma15 = sma(data, 15, sourceIndex);
        const ma50 = sma(data, 50, sourceIndex);
        const bands = bollinger(data, config.bbPeriod, config.bbMultiplier, sourceIndex);
        [ma15, ma50, bands?.upper, bands?.lower].forEach((value) => {
          if (Number.isFinite(value)) prices.push(value);
        });
      });
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const priceRange = Math.max(max - min, 1);
      const y = (price) => pad.top + ((max - price) / priceRange) * chartH;
      const x = (index) => pad.left + (index / Math.max(visibleData.length - 1, 1)) * chartW;
      const candleW = Math.max(2, Math.min(10, chartW / visibleData.length * 0.65));
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#0f141b";
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = "#1f2a38";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 5; i += 1) {
        const gy = pad.top + (chartH / 5) * i;
        ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(width - pad.right + 8, gy); ctx.stroke();
        const price = max - ((max - min) / 5) * i;
        ctx.fillStyle = "#8b98a9"; ctx.font = "12px system-ui"; ctx.fillText(fmtMoney(price), width - pad.right + 12, gy + 4);
      }
      visibleData.forEach((row, index) => {
        const cx = x(index);
        const rising = row.close >= row.open;
        ctx.strokeStyle = rising ? "#f6465d" : "#0b74ff";
        ctx.fillStyle = rising ? "#f6465d" : "#0b74ff";
        ctx.beginPath(); ctx.moveTo(cx, y(row.high)); ctx.lineTo(cx, y(row.low)); ctx.stroke();
        const top = y(Math.max(row.open, row.close));
        const bottom = y(Math.min(row.open, row.close));
        ctx.fillRect(cx - candleW / 2, top, candleW, Math.max(1, bottom - top));
      });
      function drawIndicator(color, lineWidth, getValue, dash = []) {
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.setLineDash(dash);
        ctx.beginPath();
        let started = false;
        visibleData.forEach((_, index) => {
          const sourceIndex = chartViewStart + index;
          const value = getValue(sourceIndex);
          if (!Number.isFinite(value)) return;
          const px = x(index);
          const py = y(value);
          if (!started) {
            ctx.moveTo(px, py);
            started = true;
          } else {
            ctx.lineTo(px, py);
          }
        });
        ctx.stroke();
        ctx.setLineDash([]);
      }
      drawIndicator("#f0b90b", 1.5, (sourceIndex) => sma(data, 15, sourceIndex));
      drawIndicator("#a78bfa", 1.5, (sourceIndex) => sma(data, 50, sourceIndex));
      drawIndicator("#8b98a9", 1, (sourceIndex) => bollinger(data, config.bbPeriod, config.bbMultiplier, sourceIndex)?.upper, [5, 4]);
      drawIndicator("#8b98a9", 1, (sourceIndex) => bollinger(data, config.bbPeriod, config.bbMultiplier, sourceIndex)?.lower, [5, 4]);
      trades.forEach((trade) => {
        const sourceIndex = data.findIndex((row) => row.date === trade.date);
        if (sourceIndex < chartViewStart || sourceIndex >= viewEnd) return;
        const px = x(sourceIndex - chartViewStart); const py = y(trade.price);
        ctx.fillStyle = trade.side === "매수" ? "#f6465d" : "#0b74ff";
        ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();
      });
      if (visibleEquity.length > 1) {
        const minEq = Math.min(...visibleEquity.map((row) => row.value));
        const maxEq = Math.max(...visibleEquity.map((row) => row.value));
        const eqY = (value) => pad.top + chartH - ((value - minEq) / Math.max(maxEq - minEq, 1)) * (chartH * 0.22);
        ctx.strokeStyle = "#0ecb81"; ctx.lineWidth = 1.4; ctx.beginPath();
        visibleEquity.forEach((row, index) => { const px = x(index); const py = eqY(row.value); if (index === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); });
        ctx.stroke();
      }
      ctx.fillStyle = "#8b98a9"; ctx.font = "12px system-ui"; ctx.fillText(visibleData[0].date, pad.left, height - 16); ctx.fillText(visibleData[visibleData.length - 1].date, width - pad.right - 18, height - 16);
      const legend = [
        ["#f0b90b", "MA15"],
        ["#a78bfa", "MA50"],
        ["#8b98a9", `BB ${config.bbPeriod}/${config.bbMultiplier}`],
        ["#0ecb81", "자산 곡선"]
      ];
      if (data.length > chartViewSize) legend.push(["#8b98a9", "드래그로 과거 이동"]);
      let legendX = pad.left + 8;
      let legendY = 18;
      const legendRight = width - pad.right - 8;
      legend.forEach(([color, text]) => {
        const textW = ctx.measureText(text).width + 18;
        if (legendX + textW > legendRight && legendX > pad.left + 8) {
          legendX = pad.left + 8;
          legendY += 16;
        }
        ctx.fillStyle = color;
        ctx.fillText(text, legendX, legendY);
        legendX += textW;
      });
    }

    function drawMessage(message) {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(rect.width, 1) * ratio;
      canvas.height = Math.max(rect.height, 1) * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.fillStyle = "#0f141b";
      ctx.fillRect(0, 0, rect.width, rect.height);
      ctx.fillStyle = "#8b98a9";
      ctx.font = "14px system-ui";
      ctx.textAlign = "center";
      ctx.fillText(message, rect.width / 2, rect.height / 2);
      ctx.textAlign = "left";
    }

    function startLiveRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => loadCandles({ keepDates: true, silent: true, quick: true }), 60000);
    }

    function setDefaultDateRange() {
      if (!form.startYear.options.length || !form.endYear.options.length) return;
      const end = todayKst();
      const endDate = formatDateInput(end);
      const start = new Date(end);
      start.setFullYear(start.getFullYear() - 1);
      const startDate = formatDateInput(start);
      setSelectDate("start", startDate);
      setSelectDate("end", endDate);
    }

    function updateConditionInputs() {
      document.querySelectorAll(".condition").forEach((condition) => {
        const checkbox = condition.querySelector("input[type='checkbox']");
        if (!checkbox) return;
        condition.querySelectorAll("input[type='number'], select").forEach((control) => {
          control.disabled = !checkbox.checked;
        });
      });
    }

    function panChart(clientX) {
      if (!lastChartData || lastChartData.length <= chartViewSize) return;
      const delta = clientX - dragStartX;
      const candlesPerPixel = chartViewSize / Math.max(canvas.clientWidth, 1);
      const nextStart = dragStartView - Math.round(delta * candlesPerPixel);
      chartViewStart = Math.max(0, Math.min(nextStart, lastChartData.length - chartViewSize));
      drawChart(lastChartData, lastChartEquity, lastChartTrades, lastChartConfig);
    }

    form.addEventListener("submit", (event) => { event.preventDefault(); runBacktest(); });
    form.market.addEventListener("change", () => loadCandles());
    form.interval.addEventListener("change", () => loadCandles());
    ["orderPct", "rsiPeriod", "volumePeriod", "bbPeriod", "bbMultiplier", "buyMode", "sellMode", "buyUseRsi", "buyRsi", "buyUseMaCross", "buyUseMa15CrossUp", "buyUseMa15CrossDown", "buyUseMa50CrossUp", "buyUseMa50CrossDown", "buyUseBbLower", "buyUseVolumeSpike", "buyVolumeMultiplier", "sellUseRsi", "sellRsi", "sellUseMaCross", "sellUseMa15CrossUp", "sellUseMa15CrossDown", "sellUseMa50CrossUp", "sellUseMa50CrossDown", "sellUseBbUpper", "sellUseTakeProfit", "takeProfit", "sellUseStopLoss", "stopLoss", "sellUseTrailing", "trailingStop", "feePct"].forEach((name) => {
      form[name].addEventListener("change", () => {
        updateConditionInputs();
        runBacktest();
      });
    });
    ["startYear", "startMonth", "startDay", "endYear", "endMonth", "endDay"].forEach((name) => {
      form[name].addEventListener("change", () => {
        runBacktest();
      });
    });
    canvas.addEventListener("pointerdown", (event) => {
      if (!lastChartData || lastChartData.length <= chartViewSize) return;
      isDraggingChart = true;
      dragStartX = event.clientX;
      dragStartView = chartViewStart;
      canvas.setPointerCapture(event.pointerId);
    });
    canvas.addEventListener("pointermove", (event) => {
      if (!isDraggingChart) return;
      panChart(event.clientX);
    });
    canvas.addEventListener("pointerup", () => { isDraggingChart = false; });
    canvas.addEventListener("pointercancel", () => { isDraggingChart = false; });
    window.addEventListener("resize", () => { if (candles.length) runBacktest(); });
    updateConditionInputs();
    loadCandles()
      .then(startLiveRefresh);
  </script>
</body>
</html>
